<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Highway 395 Trip Planner</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  html, body { margin:0; padding:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:#222; }
  #app { display:flex; height:100vh; }
  #map { flex:1; }
  #panel { width:320px; background:#f7f8fa; border-left:1px solid #e2e5ea; display:flex; flex-direction:column; }
  #panel header { background:#1b3a4b; color:#fff; padding:14px 16px; }
  #panel header h1 { margin:0; font-size:16px; }
  #panel header p { margin:5px 0 0; font-size:12px; opacity:.85; line-height:1.4; }
  .section { padding:12px 16px; border-bottom:1px solid #e9ebf0; }
  .section h2 { font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:#6b7280; margin:0 0 8px; }
  .hint { font-size:12px; color:#6b7280; line-height:1.4; }
  .toggle { display:flex; align-items:center; gap:8px; font-size:13px; }
  .selitem { display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid #e2e5ea; border-radius:8px; padding:7px 10px; margin-bottom:6px; font-size:13px; }
  .selitem .x { cursor:pointer; color:#c0392b; font-weight:700; padding:0 4px; }
  .selitem .ord { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%; background:#1b3a4b; color:#fff; font-size:11px; margin-right:7px; }
  #result { padding:12px 16px; overflow-y:auto; flex:1; }
  .big { font-size:26px; font-weight:700; color:#1b3a4b; }
  .sub { font-size:13px; color:#444; margin-top:2px; }
  .leg { font-size:12px; color:#374151; padding:6px 0; border-bottom:1px dashed #e2e5ea; }
  .leg b { color:#1b3a4b; }
  .btnrow { display:flex; gap:8px; padding:10px 16px; border-top:1px solid #e9ebf0; }
  button { font:inherit; font-size:13px; border:1px solid #cbd2dc; background:#fff; border-radius:8px; padding:8px 10px; cursor:pointer; flex:1; }
  button.primary { background:#1b3a4b; color:#fff; border-color:#1b3a4b; }
  button:disabled { opacity:.5; cursor:default; }
  a.gm { color:#1b3a4b; font-weight:600; }
  .pin { display:flex; align-items:center; justify-content:center; border-radius:50%; color:#fff; font-weight:700; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.4); }
  .pin.stop { width:26px; height:26px; font-size:13px; background:#c0392b; }
  .pin.start { width:26px; height:26px; font-size:14px; background:#27ae60; }
  .pin.hotel { width:22px; height:22px; font-size:12px; background:#2e6fb5; }
  .pin.sel { box-shadow:0 0 0 4px #ffd27f, 0 1px 4px rgba(0,0,0,.4); }
  .legend { background:#fff; padding:8px 10px; font-size:12px; line-height:1.6; box-shadow:0 1px 5px rgba(0,0,0,.3); border-radius:6px; }
  .dot { display:inline-block; width:11px; height:11px; border-radius:50%; vertical-align:-1px; margin-right:6px; }
  @media (max-width:760px){ #app{flex-direction:column;} #panel{width:auto; height:46vh;} #map{height:54vh;} }
</style>
</head>
<body>
<div id="app">
  <div id="map"></div>
  <div id="panel">
    <header>
      <h1>Highway 395 Trip Planner</h1>
      <p>Click any marker on the map to add it. Click again (or ✕) to remove. Pick 2+ points to see driving time between them.</p>
    </header>
    <div class="section">
      <label class="toggle"><input type="checkbox" id="showHotels" checked> Show hotel locations 🏨</label>
    </div>
    <div class="section">
      <h2>Selected points</h2>
      <div id="sellist"><p class="hint">No points selected yet. Click markers to build a route.</p></div>
    </div>
    <div id="result"></div>
    <div class="btnrow">
      <button id="clearBtn" disabled>Clear all</button>
      <button id="gmBtn" class="primary" disabled>Open in Google Maps</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ---------- Data ----------
var POINTS = [
  { id:"start", kind:"start", label:"Irvine / SNA (start & end)", lat:33.6846, lng:-117.7857, gm:"John Wayne Airport, Irvine, CA" },
  { id:"s1",  kind:"stop", num:1,  label:"Lone Pine",                 lat:36.6061, lng:-118.0626, gm:"Lone Pine, CA" },
  { id:"s2",  kind:"stop", num:2,  label:"Whitney Portal Road",       lat:36.5872, lng:-118.2399, gm:"Whitney Portal, Lone Pine, CA" },
  { id:"s3",  kind:"stop", num:3,  label:"Alabama Hills",             lat:36.6044, lng:-118.1182, gm:"Alabama Hills, Lone Pine, CA" },
  { id:"s4",  kind:"stop", num:4,  label:"Bishop",                    lat:37.3614, lng:-118.3951, gm:"Bishop, CA" },
  { id:"s5",  kind:"stop", num:5,  label:"Mammoth Lakes",             lat:37.6485, lng:-118.9721, gm:"Mammoth Lakes, CA" },
  { id:"s6",  kind:"stop", num:6,  label:"Hot Creek Geological Site", lat:37.6614, lng:-118.8276, gm:"Hot Creek Geological Site, CA" },
  { id:"s7",  kind:"stop", num:7,  label:"June Lake Loop",            lat:37.7785, lng:-119.0719, gm:"June Lake, CA" },
  { id:"s8",  kind:"stop", num:8,  label:"Mono Lake (South Tufa)",    lat:37.9389, lng:-119.0264, gm:"Mono Lake South Tufa, CA" },
  { id:"s9",  kind:"stop", num:9,  label:"Bodie State Historic Park", lat:38.2121, lng:-119.0127, gm:"Bodie State Historic Park, CA" },
  { id:"s10", kind:"stop", num:10, label:"Lake Tahoe (South)",        lat:38.9399, lng:-119.9772, gm:"South Lake Tahoe, CA" },
  // Hotels (real availability for the trip dates)
  { id:"h_irv", kind:"hotel", label:"Homewood Suites by Hilton – SNA", lat:33.6954, lng:-117.8523, near:"Irvine", note:"4.8★ · ~$205/nt", gm:"Homewood Suites by Hilton Irvine John Wayne Airport" },
  { id:"h_lp1", kind:"hotel", label:"Best Western Frontier Motel",     lat:36.5937, lng:-118.0574, near:"Lone Pine", note:"4.3★ · ~$183/nt · top-rated in town", gm:"Best Western Frontier Motel, Lone Pine, CA" },
  { id:"h_lp2", kind:"hotel", label:"Dow Villa Motel",                 lat:36.6038, lng:-118.0616, near:"Lone Pine", note:"4.1★ · ~$180/nt · historic", gm:"Dow Villa Motel, Lone Pine, CA" },
  { id:"h_mm1", kind:"hotel", label:"The Westin Monache Resort",       lat:37.6492, lng:-118.9869, near:"Mammoth Lakes", note:"4.3★ · ~$424/nt · top luxury", gm:"The Westin Monache Resort, Mammoth Lakes, CA" },
  { id:"h_mm2", kind:"hotel", label:"Limelight Mammoth",               lat:37.6484, lng:-118.9853, near:"Mammoth Lakes", note:"4.3★ · ~$412/nt · brand new", gm:"Limelight Hotel Mammoth, CA" },
  { id:"h_th1", kind:"hotel", label:"The Landing Lake Tahoe Resort & Spa", lat:38.9611, lng:-119.9490, near:"Lake Tahoe", note:"4.6★ · ~$523/nt · lakefront", gm:"The Landing Resort and Spa, South Lake Tahoe, CA" },
  { id:"h_th2", kind:"hotel", label:"Desolation Hotel",               lat:38.9591, lng:-119.9456, near:"Lake Tahoe", note:"4.9★ · ~$959/nt · boutique luxury", gm:"Desolation Hotel, South Lake Tahoe, CA" },
  { id:"h_th3", kind:"hotel", label:"Marriott Grand Residence Club",  lat:38.9559, lng:-119.9436, near:"Lake Tahoe", note:"4.3★ · ~$399/nt · at the gondola", gm:"Marriott Grand Residence Club Lake Tahoe, CA" }
];
var BYID = {}; POINTS.forEach(function(p){ BYID[p.id]=p; });

// ---------- Map ----------
var map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:18, attribution:'&copy; OpenStreetMap contributors' }).addTo(map);

var markers = {};
var selected = [];        // ordered list of ids
var routeLayer = null;

function icon(p, isSel){
  var cls = 'pin ' + p.kind + (isSel ? ' sel' : '');
  var label = p.kind==='stop' ? p.num : (p.kind==='start' ? '★' : '🏨');
  var size = p.kind==='hotel' ? 22 : 26;
  return L.divIcon({ className:'', html:'<div class="'+cls+'">'+label+'</div>', iconSize:[size,size], iconAnchor:[size/2,size/2] });
}

POINTS.forEach(function(p){
  var m = L.marker([p.lat,p.lng], { icon:icon(p,false), zIndexOffset: p.kind==='hotel'?0:500 });
  var pop = '<b>'+(p.kind==='stop'? p.num+'. ':'')+p.label+'</b>';
  if (p.kind==='hotel') pop += '<br><span style="color:#2e6fb5">🏨 near '+p.near+' · '+p.note+'</span>';
  pop += '<br><span style="font-size:12px;color:#1b3a4b;cursor:pointer" onclick="window.__toggle(\''+p.id+'\')">▸ click marker to add/remove from route</span>';
  m.bindPopup(pop);
  m.on('click', function(){ toggle(p.id); });
  m.addTo(map);
  markers[p.id] = m;
});

map.fitBounds(POINTS.filter(function(p){return p.kind!=='hotel';}).map(function(p){return [p.lat,p.lng];}), { padding:[40,40] });

// legend
var legend = L.control({position:'bottomleft'});
legend.onAdd = function(){ var d=L.DomUtil.create('div','legend');
  d.innerHTML='<span class="dot" style="background:#27ae60"></span>Start/end (Irvine)<br>'+
              '<span class="dot" style="background:#c0392b"></span>Stops 1–10<br>'+
              '<span class="dot" style="background:#2e6fb5"></span>Hotels';
  return d; };
legend.addTo(map);

// ---------- Selection ----------
window.__toggle = function(id){ toggle(id); };
function toggle(id){
  var i = selected.indexOf(id);
  if (i>=0) selected.splice(i,1); else selected.push(id);
  markers[id].setIcon(icon(BYID[id], selected.indexOf(id)>=0));
  renderSelList();
  updateRoute();
}
function removeId(id){
  var i = selected.indexOf(id);
  if (i>=0){ selected.splice(i,1); markers[id].setIcon(icon(BYID[id],false)); renderSelList(); updateRoute(); }
}
function clearAll(){
  selected.slice().forEach(function(id){ markers[id].setIcon(icon(BYID[id],false)); });
  selected = []; renderSelList(); updateRoute();
}
window.__remove = removeId;

function renderSelList(){
  var el = document.getElementById('sellist');
  if (!selected.length){ el.innerHTML = '<p class="hint">No points selected yet. Click markers to build a route.</p>'; }
  else {
    el.innerHTML = selected.map(function(id,idx){
      var p = BYID[id];
      var name = (p.kind==='stop'? p.num+'. ':'') + p.label + (p.kind==='hotel'? ' 🏨':'');
      return '<div class="selitem"><span><span class="ord">'+(idx+1)+'</span>'+name+'</span>'+
             '<span class="x" onclick="window.__remove(\''+id+'\')">✕</span></div>';
    }).join('');
  }
  document.getElementById('clearBtn').disabled = !selected.length;
  document.getElementById('gmBtn').disabled = selected.length < 2;
}

// ---------- Routing ----------
function fmtDur(sec){ var m=Math.round(sec/60); var h=Math.floor(m/60); m=m%60; return h? (h+' hr '+(m<10?'0':'')+m+' min') : (m+' min'); }
function fmtMi(m){ return (m*0.000621371).toFixed(m<2000?1:0)+' mi'; }
function haversine(a,b){ var R=6371000,toR=Math.PI/180; var dLat=(b.lat-a.lat)*toR,dLng=(b.lng-a.lng)*toR;
  var s=Math.sin(dLat/2)**2+Math.cos(a.lat*toR)*Math.cos(b.lat*toR)*Math.sin(dLng/2)**2; return 2*R*Math.asin(Math.sqrt(s)); }

function updateRoute(){
  if (routeLayer){ map.removeLayer(routeLayer); routeLayer=null; }
  var res = document.getElementById('result');
  if (selected.length < 2){
    res.innerHTML = '<p class="hint">'+(selected.length===1?'Pick one more point to see the driving time.':'Select two points to see the driving time and route between them.')+'</p>';
    return;
  }
  res.innerHTML = '<p class="hint">Calculating driving route…</p>';
  var pts = selected.map(function(id){ return BYID[id]; });
  var coordStr = pts.map(function(p){ return p.lng+','+p.lat; }).join(';');
  var url = 'https://router.project-osrm.org/route/v1/driving/'+coordStr+'?overview=full&geometries=geojson';
  fetch(url).then(function(r){ return r.json(); }).then(function(d){
    if (!d.routes || !d.routes.length) throw new Error('no route');
    var route = d.routes[0];
    var line = L.geoJSON(route.geometry, { style:{ color:'#c0392b', weight:4, opacity:.8 } }).addTo(map);
    routeLayer = line;
    var legsHtml = '';
    (route.legs||[]).forEach(function(leg,i){
      legsHtml += '<div class="leg"><b>'+labelOf(pts[i])+' → '+labelOf(pts[i+1])+'</b><br>'+fmtDur(leg.duration)+' · '+fmtMi(leg.distance)+'</div>';
    });
    var head = (selected.length===2)
      ? '<div class="big">'+fmtDur(route.duration)+'</div><div class="sub">'+fmtMi(route.distance)+' driving · '+labelOf(pts[0])+' ⇄ '+labelOf(pts[1])+'</div>'
      : '<div class="big">'+fmtDur(route.duration)+'</div><div class="sub">'+fmtMi(route.distance)+' total · '+selected.length+' stops</div>';
    res.innerHTML = head + '<div style="margin-top:10px">'+legsHtml+'</div>'+
      '<p class="hint" style="margin-top:10px">Live driving estimate (no traffic). Mountain roads & summer weekends run slower.</p>';
  }).catch(function(){
    // Fallback: straight-line estimate
    var total=0, legsHtml='';
    for (var i=0;i<pts.length-1;i++){
      var dm = haversine(pts[i],pts[i+1])*1.3;            // road factor
      var sec = dm/ (50*1609.34/3600);                    // ~50 mph avg
      total += sec;
      legsHtml += '<div class="leg"><b>'+labelOf(pts[i])+' → '+labelOf(pts[i+1])+'</b><br>~'+fmtDur(sec)+' · ~'+fmtMi(dm)+'</div>';
    }
    routeLayer = L.polyline(pts.map(function(p){return [p.lat,p.lng];}), { color:'#c0392b', weight:3, opacity:.6, dashArray:'6,8' }).addTo(map);
    res.innerHTML = '<div class="big">~'+fmtDur(total)+'</div><div class="sub">estimated (routing server unavailable)</div>'+
      '<div style="margin-top:10px">'+legsHtml+'</div>';
  });
}
function labelOf(p){ return (p.kind==='stop'? p.num+'. ':'')+p.label; }

// ---------- Buttons ----------
document.getElementById('clearBtn').onclick = clearAll;
document.getElementById('gmBtn').onclick = function(){
  if (selected.length<2) return;
  var url = 'https://www.google.com/maps/dir/'+selected.map(function(id){ return encodeURIComponent(BYID[id].gm); }).join('/');
  window.open(url,'_blank');
};
document.getElementById('showHotels').onchange = function(e){
  POINTS.filter(function(p){return p.kind==='hotel';}).forEach(function(p){
    if (e.target.checked) markers[p.id].addTo(map); else map.removeLayer(markers[p.id]);
  });
};

renderSelList();
updateRoute();
</script>
</body>
</html>
